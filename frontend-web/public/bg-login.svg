<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F7F8FA"/>
      <stop offset="100%" style="stop-color:#EAF0F8"/>
    </linearGradient>
    <linearGradient id="wave1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1A3C6E;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#2E75B6;stop-opacity:0.06"/>
    </linearGradient>
    <linearGradient id="wave2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2E75B6;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#1A3C6E;stop-opacity:0.14"/>
    </linearGradient>
    <linearGradient id="circle1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A3C6E;stop-opacity:0.10"/>
      <stop offset="100%" style="stop-color:#2E75B6;stop-opacity:0.04"/>
    </linearGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="2"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="1.5"/></filter>
  </defs>

  <!-- Fundo off-white -->
  <rect width="1440" height="900" fill="url(#bg)"/>

  <!-- Ondas suaves de fundo -->
  <path d="M0 600 Q360 480 720 560 Q1080 640 1440 520 L1440 900 L0 900 Z" fill="url(#wave1)"/>
  <path d="M0 680 Q400 600 800 650 Q1100 690 1440 620 L1440 900 L0 900 Z" fill="url(#wave2)"/>

  <!-- Círculos decorativos grandes -->
  <circle cx="80" cy="80" r="180" fill="url(#circle1)"/>
  <circle cx="1380" cy="820" r="220" fill="url(#circle1)"/>
  <circle cx="1300" cy="100" r="120" fill="#2E75B6" opacity="0.05"/>
  <circle cx="200" cy="800" r="140" fill="#1A3C6E" opacity="0.06"/>

  <!-- Grid de pontos -->
  <g opacity="0.18" fill="#1A3C6E">
    <!-- coluna 1 -->
    <circle cx="60" cy="160" r="2.5"/><circle cx="60" cy="220" r="2.5"/><circle cx="60" cy="280" r="2.5"/>
    <circle cx="60" cy="340" r="2.5"/><circle cx="60" cy="400" r="2.5"/><circle cx="60" cy="460" r="2.5"/>
    <!-- coluna 2 -->
    <circle cx="120" cy="160" r="2.5"/><circle cx="120" cy="220" r="2.5"/><circle cx="120" cy="280" r="2.5"/>
    <circle cx="120" cy="340" r="2.5"/><circle cx="120" cy="400" r="2.5"/><circle cx="120" cy="460" r="2.5"/>
    <!-- coluna 3 -->
    <circle cx="180" cy="160" r="2.5"/><circle cx="180" cy="220" r="2.5"/><circle cx="180" cy="280" r="2.5"/>
    <circle cx="180" cy="340" r="2.5"/><circle cx="180" cy="400" r="2.5"/>
    <!-- lado direito -->
    <circle cx="1260" cy="300" r="2.5"/><circle cx="1320" cy="300" r="2.5"/><circle cx="1380" cy="300" r="2.5"/>
    <circle cx="1260" cy="360" r="2.5"/><circle cx="1320" cy="360" r="2.5"/><circle cx="1380" cy="360" r="2.5"/>
    <circle cx="1260" cy="420" r="2.5"/><circle cx="1320" cy="420" r="2.5"/><circle cx="1380" cy="420" r="2.5"/>
    <circle cx="1260" cy="480" r="2.5"/><circle cx="1320" cy="480" r="2.5"/><circle cx="1380" cy="480" r="2.5"/>
  </g>

  <!-- Ícone caixa (esquerda) -->
  <g transform="translate(160, 320)" opacity="0.13" fill="none" stroke="#1A3C6E" stroke-width="3" stroke-linejoin="round">
    <polygon points="60,10 110,35 110,85 60,110 10,85 10,35" />
    <line x1="10" y1="35" x2="60" y2="60"/>
    <line x1="110" y1="35" x2="60" y2="60"/>
    <line x1="60" y1="60" x2="60" y2="110"/>
    <line x1="35" y1="22" x2="85" y2="22"/>
  </g>

  <!-- Ícone caminhão (direita) -->
  <g transform="translate(1200, 350)" opacity="0.11" fill="none" stroke="#2E75B6" stroke-width="3" stroke-linejoin="round">
    <rect x="0" y="10" width="70" height="45" rx="4"/>
    <path d="M70 20 L95 20 L110 38 L110 55 L70 55 Z"/>
    <circle cx="20" cy="58" r="10"/>
    <circle cx="85" cy="58" r="10"/>
    <line x1="70" y1="10" x2="70" y2="55"/>
  </g>

  <!-- Ícone pin localização (topo centro) -->
  <g transform="translate(690, 60)" opacity="0.12" fill="none" stroke="#1A3C6E" stroke-width="3">
    <path d="M30 0 C14 0 0 13 0 29 C0 50 30 75 30 75 C30 75 60 50 60 29 C60 13 46 0 30 0 Z"/>
    <circle cx="30" cy="29" r="12"/>
  </g>

  <!-- Linhas de conexão decorativas -->
  <g opacity="0.09" stroke="#1A3C6E" stroke-width="1.5" fill="none" stroke-dasharray="6 4">
    <path d="M220 380 Q500 280 720 380 Q940 480 1200 380"/>
    <path d="M100 500 Q400 420 720 460 Q1000 500 1340 430"/>
  </g>

  <!-- Linha de progresso (referência ao tracking) -->
  <g transform="translate(320, 120)" opacity="0.14">
    <circle cx="0" cy="16" r="8" fill="#1A3C6E"/>
    <line x1="8" y1="16" x2="112" y2="16" stroke="#2E75B6" stroke-width="2.5"/>
    <circle cx="120" cy="16" r="8" fill="#2E75B6"/>
    <line x1="128" y1="16" x2="232" y2="16" stroke="#2E75B6" stroke-width="2" stroke-dasharray="5 3"/>
    <circle cx="240" cy="16" r="6" fill="none" stroke="#2E75B6" stroke-width="2"/>
    <text x="-12" y="38" font-family="Arial" font-size="9" fill="#1A3C6E">Coletado</text>
    <text x="100" y="38" font-family="Arial" font-size="9" fill="#2E75B6">Em Trânsito</text>
    <text x="218" y="38" font-family="Arial" font-size="9" fill="#2E75B6">Entregue</text>
  </g>

  <!-- Partículas pequenas espalhadas -->
  <g opacity="0.15" fill="#2E75B6">
    <circle cx="400" cy="200" r="3"/><circle cx="650" cy="150" r="2"/>
    <circle cx="900" cy="220" r="3"/><circle cx="1100" cy="180" r="2"/>
    <circle cx="350" cy="700" r="3"/><circle cx="580" cy="750" r="2"/>
    <circle cx="850" cy="680" r="3"/><circle cx="1050" cy="730" r="2"/>
    <circle cx="1250" cy="650" r="3"/>
  </g>

  <!-- Losangos decorativos -->
  <g opacity="0.10" fill="none" stroke="#1A3C6E" stroke-width="1.5">
    <rect x="480" y="680" width="20" height="20" transform="rotate(45 490 690)"/>
    <rect x="980" y="120" width="16" height="16" transform="rotate(45 988 128)"/>
    <rect x="1350" y="500" width="14" height="14" transform="rotate(45 1357 507)"/>
    <rect x="80" y="620" width="18" height="18" transform="rotate(45 89 629)"/>
  </g>
</svg>
